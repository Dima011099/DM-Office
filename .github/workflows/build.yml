name: build gtkmm 4 project (windows)
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup msys2 and install dependencies
        uses: msys2/setup-msys2@v2
        with:
          msystem: mingw64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-gtkmm-4.0

      - name: configure cmake
        run: cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Release

      - name: build project
        run: cmake --build build

      - name: collect dependencies
        run: |
          # Находим все зависимости через ldd и копируем их в папку build
          ldd build/*.exe | grep /mingw64/bin/ | sed -e 's/.*=> \(\/mingw64\/bin\/[^ ]*\).*/\1/' | xargs -I{} cp -n {} build/

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gtkmm-app-windows
          # Теперь загружаем всю папку со всеми DLL
          path: build/
