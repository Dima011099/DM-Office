name: Build gtkmm 4 Project (Windows)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-windows:
    runs-on: windows-latest

    defaults:
      run:
        # Это критически важно: запускать команды именно в оболочке MINGW64
        shell: msys2 {0}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSYS2 and Install Dependencies
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          # Полный список необходимых пакетов
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-gtkmm-4.0

      - name: Configure CMake
        run: |
          cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build Project
        run: |
          cmake --build build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gtkmm-app-windows
          # Путь к скомпилированному .exe (замените на имя вашего проекта)
          path: build/*.exe


